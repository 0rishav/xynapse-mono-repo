apiVersion: argoproj.io/v1alpha1 
kind: Rollout                 
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  replicas: 1                   
  selector:
    matchLabels:
      app: identity
  strategy:
    canary:
      steps:
        - setWeight: 25      
        - pause: {duration: 2m} 
        - setWeight: 50      
        - pause: {duration: 1m}
        - setWeight: 100     
  template:
    metadata:
      labels:
        app: identity
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "xynapse-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/global"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/global" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}='{{ $value }}'
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: identity
        image: us-central1-docker.pkg.dev/project-5e783ec5-d363-4cc7-884/xynapse-mono-repo/identity:v1.0.1
        command: ["/bin/sh", "-c"]
        args:
          - |
            # 1. Wait for vault file AND content (-s flag ensures it's not empty)
            while [ ! -s /vault/secrets/config ]; do echo "Waiting for identity secrets..."; sleep 2; done;
            
            # 2. Source variables with export enforcement
            set -a
            . /vault/secrets/config
            set +a
            
            # 3. Path Fix: Agar WORKDIR apps/identity-service hai toh src/index.js chalega.
            # Fallback ke liye || use kiya hai taaki dono mein se jo sahi ho wo chal jaye.
            node src/index.js || node apps/identity-service/src/index.js
        ports:
        - containerPort: 8001
        resources:
          requests:
            memory: "256Mi" 
            cpu: "100m"
          limits:
            memory: "512Mi" 
            cpu: "300m"

---

apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  selector:
    app: identity
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8001