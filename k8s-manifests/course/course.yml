apiVersion: argoproj.io/v1alpha1 
kind: Rollout              
metadata:
  name: course-service
  namespace: xynapse-stage
spec:
  replicas: 2
  selector:
    matchLabels:
      app: course
  # CANARY STRATEGY
  strategy:
    canary:
      steps:
        - setWeight: 20       
        - pause: {duration: 2m} 
        - setWeight: 50      
        - pause: {duration: 1m}
        - setWeight: 100     
  template:
    metadata:
      labels:
        app: course
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "xynapse-role" 
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/course"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/course" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: course
        image: gcr.io/${PROJECT_ID}/course-service:latest 
        ports:
        - containerPort: 8081