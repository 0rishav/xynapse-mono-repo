# mcq.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcq-service
  namespace: xynapse-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcq
  template:
    metadata:
      labels:
        app: mcq
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mcq-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/mcq"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/mcq" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: mcq
        image: gcr.io/${PROJECT_ID}/mcq-service:latest
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: mcq-service
spec:
  selector:
    app: mcq
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8082