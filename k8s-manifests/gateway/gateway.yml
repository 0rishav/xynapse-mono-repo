apiVersion: argoproj.io/v1alpha1 
kind: Rollout                
metadata:
  name: gateway-service
  namespace: xynapse-stage
spec:
  replicas: 2                 
  selector:
    matchLabels:
      app: gateway
  strategy:
    canary:
      steps:
        - setWeight: 10       
        - pause: {duration: 2m} 
        - setWeight: 40       
        - pause: {duration: 1m}
        - setWeight: 100     
  # --- CANARY STRATEGY ---
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "xynapse-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/gateway"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/gateway" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: gateway
        image: gcr.io/${PROJECT_ID}/gateway-service:latest 
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: xynapse-stage
spec:
  selector:
    app: gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000