name: 'Smart Build Engine'
description: 'Handles Audit, Build, Remote Caching and Signing'

inputs:
  service_name:
    required: true
  project_id:
    required: true
  slack_webhook_url:
    required: true
    description: 'Slack Webhook URL for notifications'

runs:
  using: "composite"
  steps:
    # CUSTOM SECURITY AUDIT
    - name: Dockerfile Guard
      shell: bash
      run: |
        chmod +x .github/scripts/docker-audit.sh
        ./.github/scripts/docker-audit.sh apps/${{ inputs.service_name }}-service/Dockerfile

    # SETUP BUILDX for Remote Caching
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    # BUILD & PUSH WITH INLINE GCR CACHE
    - name: Build and Push
      shell: bash
      run: |
        IMAGE="gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}"
        TAG="${{ github.sha }}"
        
        docker buildx build \
          --push \
          -t ${IMAGE}:${TAG} \
          -t ${IMAGE}:latest \
          --cache-from type=registry,ref=${IMAGE}:cache \
          --cache-to type=registry,ref=${IMAGE}:cache,mode=max \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -f ./apps/${{ inputs.service_name }}-service/Dockerfile \
          .

    #  SIGN THE ARTIFACT (Cosign)
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Sign Image
      shell: bash
      run: |
        IMAGE_REF="gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}:${{ github.sha }}"
        cosign sign --yes ${IMAGE_REF}

    # TRIVY SCAN 
    - name: Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}:${{ github.sha }}'
        format: 'table'
        severity: 'CRITICAL,HIGH'

    # GENERATE STAGE 1 REPORT 
    - name: Generate Build & Security Summary
      shell: bash
      if: always()
      run: |
        echo "### Build Report: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
        echo "| Task | Status | Details |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Custom Audit** | Passed | Dockerfile Security Guard |" >> $GITHUB_STEP_SUMMARY
        echo "| **Docker Build** | Success | Image: ${{ inputs.service_name }}:${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Cache Push** | Updated | GCR Inline Cache |" >> $GITHUB_STEP_SUMMARY
        echo "| **Image Sign** | Signed | Cosign OIDC Signature |" >> $GITHUB_STEP_SUMMARY
        
        # Trivy ka results summary nikalne ke liye
        echo "### 🔍 Vulnerability Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "Check the 'Trivy Security Scan' step for full table." >> $GITHUB_STEP_SUMMARY

    - name: Generate HTML Security Report
      shell: bash
      run: |
        # Trivy HTML report generate kar raha hai
        trivy image --format template --template "@/contrib/html.tpl" \
          -o report-${{ inputs.service_name }}.html \
          gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}:${{ github.sha }}
    
    - name: Archive Security Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report-${{ inputs.service_name }}
        path: report-${{ inputs.service_name }}.html
        retention-days: 7

    - name: Notify Slack with Report Link
      shell: bash
      run: |
        # FIX 2: Yahan inputs use karo, secrets nahi
        curl -X POST -H 'Content-type: application/json' --data '{
          "text": "*Stage 1: Build & Security Report*",
          "attachments": [
            {
              "color": "#36a64f",
              "fields": [
                { "title": "Service", "value": "${{ inputs.service_name }}", "short": true },
                { "title": "Status", "value": "SUCCESS", "short": true },
                { "title": "Vulnerabilities", "value": "Check HTML Report in Actions Tab", "short": false }
              ],
              "actions": [
                {
                  "type": "button",
                  "text": "View Full Report",
                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              ]
            }
          ]
        }' ${{ inputs.slack_webhook_url }}