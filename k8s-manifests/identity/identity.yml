apiVersion: argoproj.io/v1alpha1 
kind: Rollout                
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  replicas: 2                  
  selector:
    matchLabels:
      app: identity
  strategy:
    canary:
      steps:
        - setWeight: 25      
        - pause: {duration: 2m} 
        - setWeight: 50      
        - pause: {duration: 1m}
        - setWeight: 100     
  template:
    metadata:
      labels:
        app: identity
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "xynapse-role"
        # Global path set kar diya
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/global"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/global" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: identity
        image: gcr.io/project-5e783ec5-d363-4cc7-884/identity:v1.0.1
        ports:
        - containerPort: 8080
        # Resource limits for Identity service
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"

---

apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  selector:
    app: identity
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080