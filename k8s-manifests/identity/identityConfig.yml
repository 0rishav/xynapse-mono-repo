apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-vault-config
  namespace: xynapse-stage
data:
  vault-agent-config.hcl: |
    exit_after_auth = false
    pid_file = "/home/vault/pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "identity-role"
        }
      }
    }

    sink "file" {
      config = {
        path = "/home/vault/.token"
      }
    }