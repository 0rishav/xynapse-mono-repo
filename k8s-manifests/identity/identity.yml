apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "identity-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/identity"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/identity" -}}
          export MONGO_URL="{{ .Data.data.mongo_url }}"
          {{- end -}}
    spec:
      containers:
      - name: identity
        image: gcr.io/${PROJECT_ID}/identity-service:latest 
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080