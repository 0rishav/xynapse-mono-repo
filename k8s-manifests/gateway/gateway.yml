# gateway.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: xynapse-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "gateway-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/gateway"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/gateway" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: gateway
        image: gcr.io/${PROJECT_ID}/gateway-service:latest
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  selector:
    app: gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000