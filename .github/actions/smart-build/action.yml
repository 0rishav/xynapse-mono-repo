name: 'Smart Build Engine'
description: 'Security-First Build, Scan, and Push with Full Reporting'

inputs:
  service_name: { required: true }
  project_id: { required: true }
  slack_webhook_url: { required: true }
  image_tag: { required: true }

runs:
  using: "composite"
  steps:
    # CLEANUP TMP 
    - name: Cleanup Runner Environment
      shell: bash
      run: |
        sudo rm -rf /tmp/gitleaks.tmp /tmp/gitleaks-8.24.3 || true
        docker system prune -f --filter "until=24h" || true

    #  DETECTION 
    - name: Secret Detection
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITLEAKS_ARTIFACT_NAME: gitleaks-report-${{ inputs.service_name }} 
      with:
        report-path: gitleaks-report-${{ inputs.service_name }}.json
      continue-on-error: true

    # DOCKERFILE AUDIT
    - name: Dockerfile Guard
      shell: bash
      run: |
        chmod +x .github/scripts/docker-audit.sh
        ./.github/scripts/docker-audit.sh apps/${{ inputs.service_name }}-service/Dockerfile

    # SETUP BUILDX
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    # LOCAL BUILD & TRIVY SCAN
    - name: Build Local Image
      shell: bash
      run: |
        docker buildx build \
          --load \
          -t test-image:${{ github.sha }} \
          -f ./apps/${{ inputs.service_name }}-service/Dockerfile .

    - name: Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'test-image:${{ github.sha }}'
        format: 'json'
        output: 'report-${{ inputs.service_name }}.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0' 

    # DOCKER LOGIN  
    - name: Ensure Artifact Registry Repo & Auth
      shell: bash
      run: |
        if ! gcloud artifacts repositories describe xynapse-mono-repo --location=us-central1 --project=${{ inputs.project_id }} >/dev/null 2>&1; then
          gcloud artifacts repositories create xynapse-mono-repo --repository-format=docker --location=us-central1 --project=${{ inputs.project_id }}
        fi
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # FINAL PUSH 
    - name: Build and Push to Artifact Registry
      shell: bash
      run: |
        IMAGE="us-central1-docker.pkg.dev/${{ inputs.project_id }}/xynapse-mono-repo/${{ inputs.service_name }}"
        docker buildx build \
          --push \
          -t ${IMAGE}:${{ github.sha }} \
          -t ${IMAGE}:${{ inputs.image_tag }} \
          -t ${IMAGE}:latest \
          --cache-from type=registry,ref=${IMAGE}:cache \
          --cache-to type=registry,ref=${IMAGE}:cache,mode=max \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -f ./apps/${{ inputs.service_name }}-service/Dockerfile .

    # COSIGN SIGNING 
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Sign Image
      shell: bash
      run: |
        IMAGE_REF="us-central1-docker.pkg.dev/${{ inputs.project_id }}/xynapse-mono-repo/${{ inputs.service_name }}:${{ inputs.image_tag }}"
        cosign sign --yes ${IMAGE_REF}

    # SUMMARY GENERATION
    - name: Generate Build Summary
      shell: bash
      if: always()
      run: |
        echo "### Consolidated Security Report: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Tool Used |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Secrets Scan** | Done | Gitleaks |" >> $GITHUB_STEP_SUMMARY
        echo "| **Infra Audit** | Passed | Docker-Audit |" >> $GITHUB_STEP_SUMMARY
        echo "| **Vulnerabilities** | Scanned | Trivy |" >> $GITHUB_STEP_SUMMARY
        echo "| **Registry Status** | Pushed | GCR |" >> $GITHUB_STEP_SUMMARY

    # ARCHIVE & NOTIFY
    - name: Archive Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports-${{ inputs.service_name }}
        path: |
          report-${{ inputs.service_name }}.json
          gitleaks-report-${{ inputs.service_name }}.json
        retention-days: 7

    - name: Notify Slack
      if: always()
      shell: bash
      run: |
        COL="${{ job.status == 'success' && '#36a64f' || '#ff0000' }}"
        curl -X POST -H 'Content-type: application/json' --data "{
          \"text\": \"*Pipeline Stage 2: Security & Build Report*\",
          \"attachments\": [
            {
              \"color\": \"$COL\",
              \"fields\": [
                { \"title\": \"Service\", \"value\": \"${{ inputs.service_name }}\", \"short\": true },
                { \"title\": \"GCR Status\", \"value\": \"Pushed & Signed\", \"short\": true }
              ],
              \"actions\": [
                {
                  \"type\": \"button\",
                  \"text\": \"View Details\",
                  \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                }
              ]
            }
          ]
        }" ${{ inputs.slack_webhook_url }}