# course.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-service
  namespace: xynapse-stage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course
  template:
    metadata:
      labels:
        app: course
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "course-role" # Unique Role
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/course"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/course" -}}
          {{- range $key, $value := .Data.data }}
          export {{ $key }}="{{ $value }}"
          {{- end }}
          {{- end -}}
    spec:
      containers:
      - name: course
        image: gcr.io/${PROJECT_ID}/course-service:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: course-service
spec:
  selector:
    app: course
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081