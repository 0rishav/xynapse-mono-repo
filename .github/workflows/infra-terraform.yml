name: "Infrastructure Deployment"

on:
  push:
    branches:
      - stage
      - main
      - release
    paths:
      - 'infrastructure/terraform/**'
  pull_request:
    branches:
      - stage
      - main
      - release
    paths:
      - 'infrastructure/terraform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: >-
        ${{ (contains(github.ref, 'main') || contains(github.ref, 'release') || contains(github.base_ref, 'main') || contains(github.base_ref, 'release')) 
            && './infrastructure/terraform/environments/prod' 
            || './infrastructure/terraform/environments/dev' }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCS_BUCKET_NAME }}" \
            -backend-config="prefix=terraform/state/${{ github.base_ref || github.ref_name }}"

      - name: Get GitHub Runner Token
        id: runner_token
        run: |
          TOKEN=$(curl -s -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token | jq -r .token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -input=false \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="job_id=${{ github.run_id }}" \
            -var="repo_owner=${{ github.repository_owner }}" \
            -var="repo_name=${{ github.event.repository.name }}" \
            -var="github_token=${{ steps.runner_token.outputs.token }}"

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    
    environment: >-
      ${{ github.ref == 'refs/heads/main' && 'production' || 
          github.ref == 'refs/heads/release' && 'release' || 
          'staging' 
      }}

    env:
      TF_WORKING_DIR: >-
        ${{ (contains(github.ref, 'main') || contains(github.ref, 'release')) 
            && './infrastructure/terraform/environments/prod' 
            || './infrastructure/terraform/environments/dev' }}

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCS_BUCKET_NAME }}" \
            -backend-config="prefix=terraform/state/${{ github.ref_name }}"

      - name: Get GitHub Runner Token
        id: runner_token
        run: |
          TOKEN=$(curl -s -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runners/registration-token | jq -r .token)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve -input=false \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="job_id=${{ github.run_id }}" \
            -var="repo_owner=${{ github.repository_owner }}" \
            -var="repo_name=${{ github.event.repository.name }}" \
            -var="github_token=${{ steps.runner_token.outputs.token }}"