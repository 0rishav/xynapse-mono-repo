name: 'Smart Build Engine'
description: 'Security-First Build, Scan, and Push with Full Reporting'

inputs:
  service_name: { required: true }
  project_id: { required: true }
  slack_webhook_url: { required: true }

runs:
  using: "composite"
  steps:
    # 1. CLEANUP TMP 
    - name: Cleanup Runner Environment
      shell: bash
      run: |
        sudo rm -rf /tmp/gitleaks.tmp /tmp/gitleaks-8.24.3 || true
        docker system prune -f --filter "until=24h" || true

    # 2. SECRET DETECTION 
    - name: Secret Detection
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
        args: detect --verbose --redact --no-git 

    # 3. DOCKERFILE AUDIT
    - name: Dockerfile Guard
      shell: bash
      run: |
        chmod +x .github/scripts/docker-audit.sh
        ./.github/scripts/docker-audit.sh apps/${{ inputs.service_name }}-service/Dockerfile

    # 4. SETUP BUILDX
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. LOCAL BUILD & TRIVY SCAN
    - name: Build Local Image
      shell: bash
      run: |
        docker buildx build \
          --load \
          -t test-image:${{ github.sha }} \
          -f ./apps/${{ inputs.service_name }}-service/Dockerfile .

    - name: Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'test-image:${{ github.sha }}'
        format: 'json'
        output: 'report-${{ inputs.service_name }}.json'
        severity: 'CRITICAL,HIGH'
        exit-code: '0' 

    # 6. DOCKER LOGIN REFRESH (Ye step credentials phatne se bachayega)
    - name: Refresh GCR Auth
      shell: bash
      run: gcloud auth configure-docker --quiet

    # 7. FINAL PUSH
    - name: Build and Push to GCR
      shell: bash
      run: |
        IMAGE="gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}"
        docker buildx build \
          --push \
          -t ${IMAGE}:${{ github.sha }} \
          -t ${IMAGE}:latest \
          --cache-from type=registry,ref=${IMAGE}:cache \
          --cache-to type=registry,ref=${IMAGE}:cache,mode=max \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          -f ./apps/${{ inputs.service_name }}-service/Dockerfile .

    # 8. COSIGN SIGNING 
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.5.0

    - name: Sign Image
      shell: bash
      run: |
        IMAGE_REF="gcr.io/${{ inputs.project_id }}/${{ inputs.service_name }}:${{ github.sha }}"
        cosign sign --yes ${IMAGE_REF}

    # 9. SUMMARY GENERATION
    - name: Generate Build Summary
      shell: bash
      if: always()
      run: |
        echo "### Consolidated Security Report: ${{ inputs.service_name }}" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status | Tool Used |" >> $GITHUB_STEP_SUMMARY
        echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Secrets Scan** | Done | Gitleaks |" >> $GITHUB_STEP_SUMMARY
        echo "| **Infra Audit** | Passed | Docker-Audit |" >> $GITHUB_STEP_SUMMARY
        echo "| **Vulnerabilities** | Scanned | Trivy |" >> $GITHUB_STEP_SUMMARY
        echo "| **Registry Status** | Pushed | GCR |" >> $GITHUB_STEP_SUMMARY

    # 10. ARCHIVE & NOTIFY
    - name: Archive Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report-${{ inputs.service_name }}
        path: report-${{ inputs.service_name }}.json 
        retention-days: 7

    - name: Notify Slack
      if: always()
      shell: bash
      run: |
        COL="${{ job.status == 'success' && '#36a64f' || '#ff0000' }}"
        curl -X POST -H 'Content-type: application/json' --data "{
          \"text\": \"*Pipeline Stage 2: Security & Build Report*\",
          \"attachments\": [
            {
              \"color\": \"$COL\",
              \"fields\": [
                { \"title\": \"Service\", \"value\": \"${{ inputs.service_name }}\", \"short\": true },
                { \"title\": \"GCR Status\", \"value\": \"Pushed & Signed\", \"short\": true }
              ],
              \"actions\": [
                {
                  \"type\": \"button\",
                  \"text\": \"View Details\",
                  \"url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                }
              ]
            }
          ]
        }" ${{ inputs.slack_webhook_url }}