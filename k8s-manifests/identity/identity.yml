apiVersion: argoproj.io/v1alpha1 
kind: Rollout                
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  replicas: 2                 
  selector:
    matchLabels:
      app: identity
  strategy:
    canary:
      steps:
        - setWeight: 25      
        - pause: {duration: 2m} 
        - setWeight: 50      
        - pause: {duration: 1m}
        - setWeight: 100     
  # --- CANARY STRATEGY ---
  template:
    metadata:
      labels:
        app: identity
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "xynapse-role"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/xynapse/identity"
        vault.hashicorp.com/agent-inject-template-config: |
          {{- with secret "secret/data/xynapse/identity" -}}
          export MONGO_URL="{{ .Data.data.mongo_url }}"
          {{- end -}}
    spec:
      containers:
      - name: identity
        image: gcr.io//identity:v1.0.1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: xynapse-stage
spec:
  selector:
    app: identity
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080